<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Открытка для Апашки 💖</title>

<style>
body {
  margin: 0;
  font-family: Arial;
  display: flex;
  justify-content: center;
  align-items: center;
  height: 100vh;
  background: linear-gradient(180deg, #ffd6ec, #fff);
  overflow: hidden;
  flex-direction: column;
  text-align: center;
}

h1 {
  color: #d63384;
  margin-bottom: 20px;
}

/* конверт */
.envelope {
  width: 260px;
  height: 170px;
  background: #ff6fb0;
  position: relative;
  border-radius: 10px;
  cursor: pointer;
  box-shadow: 0 10px 20px rgba(0,0,0,0.2);
}

.envelope:before {
  content: "";
  position: absolute;
  top: 0;
  left: 0;
  width: 0;
  height: 0;
  border-left: 130px solid transparent;
  border-right: 130px solid transparent;
  border-top: 85px solid #ff4da6;
}

/* письмо */
.letter {
  position: absolute;
  bottom: 10px;
  left: 50%;
  transform: translateX(-50%) translateY(120%);
  width: 220px;
  background: white;
  padding: 20px;
  border-radius: 15px;
  box-shadow: 0 10px 20px rgba(0,0,0,0.2);
  transition: transform 1s, opacity 1s;
  opacity: 0;
  pointer-events: none;
}

/* открытое письмо */
.letter.open {
  transform: translateX(-50%) translateY(-80px);
  opacity: 1;
  pointer-events: auto;
}

/* текст письма */
.letter p {
  font-size: 16px;
  line-height: 1.5;
  opacity: 0;
  transition: opacity 1s;
}

.letter.open p {
  opacity: 1;
}

/* лепестки */
.petal {
  position: fixed;
  top: -10px;
  width: 12px;
  height: 12px;
  background: pink;
  border-radius: 50%;
  animation: fall linear;
}

@keyframes fall {
  to {
    transform: translateY(110vh);
  }
}
</style>
</head>

<body>

<h1>Нажми на письмо 💌</h1>

<div class="envelope" onclick="openLetter()">

  <div class="letter" id="letter">
    <p>
      💐 С 8 марта, Апашка!<br><br>
      Спасибо тебе за заботу, тепло и ласку.<br>
      Ты самый важный и смешной человек в нашей жизни!<br><br>
      Желаю тебе счастья, здоровья и море улыбок.<br><br>
      Любим тебя очень! ❤️
    </p>
  </div>

</div>

<script>
function openLetter() {
  document.getElementById("letter").classList.toggle("open");
}

/* лепестки */
function createPetal() {
  let petal = document.createElement("div");
  petal.className = "petal";
  petal.style.left = Math.random() * 100 + "vw";
  petal.style.animationDuration = (Math.random() * 5 + 5) + "s";
  document.body.appendChild(petal);
  setTimeout(() => petal.remove(), 10000);
}

setInterval(createPetal, 300);
</script>

</body>
</html>
